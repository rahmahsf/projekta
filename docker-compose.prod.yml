version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: projekta_mysql_prod
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: rs_pku
      MYSQL_USER: projekta_user
      MYSQL_PASSWORD: Projek_rekomendasi02
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - projekta_network_prod

  db2:
    image: mysql:8.0
    container_name: projekta_mysql2_prod
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: rs_rekom
      MYSQL_USER: projekta_user
      MYSQL_PASSWORD: Projek_rekomendasi02
    volumes:
      - mysql2_data_prod:/var/lib/mysql
    restart: unless-stopped
    networks:
      - projekta_network_prod

  web:
    build: .
    container_name: projekta_web_prod
    command: >
      sh -c "python manage.py migrate --database=default &&
             python manage.py migrate --database=database2 &&
             python manage.py seed_all &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8080 website.wsgi:application"
    volumes:
      - .:/app
      - staticfiles_prod:/app/staticfiles
    depends_on:
      - db
      - db2
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-8k%z#2@!q9j3x$7r5w#1n4m6p8f2t%y&h*j@k=l+g9s3v7b
      - DB_HOST=db
      - DB_HOST2=db2
      - DB_USER=projekta_user
      - DB_PASSWORD=Projek_rekomendasi02
      - DB_NAME=rs_pku
      - DB2_NAME=rs_rekom
      - ALLOWED_HOSTS=rahmah.nasrulfahmi.my.id,www.rahmah.nasrulfahmi.my.id
      - CSRF_TRUSTED_ORIGINS=https://rahmah.nasrulfahmi.my.id,https://www.rahmah.nasrulfahmi.my.id,http://localhost:8080
    restart: unless-stopped
    networks:
      - projekta_network_prod

  nginx:
    image: nginx:alpine
    container_name: projekta_nginx_prod
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./default.prod.conf:/etc/nginx/conf.d/default.conf
      - staticfiles_prod:/static
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - projekta_network_prod

volumes:
  mysql_data_prod:
  mysql2_data_prod:
  staticfiles_prod:

networks:
  projekta_network_prod:
    driver: bridge
