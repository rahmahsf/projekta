{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Dashboard{% endblock %}</title>

  <link rel="icon" href="{% static 'assets/img/logo-rs.png' %}">
  <link href="{% static 'assets/css/soft-ui-dashboard-tailwind.css' %}" rel="stylesheet">
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
</head>

<body class="bg-gray-50 text-slate-500">

  <!-- SIDENAV -->
  {% include "layout/sidenav.html" %}

  <!-- MAIN CONTENT -->
  <main class="xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all">


    <!-- HEADER -->
    {% include "layout/header.html" %}

    <!-- PAGE CONTENT -->
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'assets/js/soft-ui-dashboard-tailwind.js' %}"></script>
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    {% include "layout/footer.html" %}

  </main>

  <script src="{% static 'assets/js/soft-ui-dashboard-tailwind.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
