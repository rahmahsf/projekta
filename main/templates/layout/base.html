{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Dashboard{% endblock %}</title>

  <link rel="icon" href="{% static 'assets/img/logo-rs.png' %}">

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'assets/css/sidenav.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/rekomendasi.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/revise.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/custom.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/dashboard-styling.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/soft-ui-dashboard-tailwind.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/nucleo-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/nucleo-svg.css' %}">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700"
    rel="stylesheet">

  <!-- FontAwesome (cukup sekali) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-gray-50 text-slate-500">

  <!-- SIDENAV -->
  {% include "layout/sidenav.html" %}

  <!-- MAIN CONTENT -->
  <main class="xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all">

    <!-- HEADER -->
    {% include "layout/header.html" %}

    <!-- MESSAGES -->
    {% for message in messages %}
      <div id="notification" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #4CAF50; color: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 99999; font-size: 16px; font-weight: bold;">
        {{ message }}
      </div>
    {% endfor %}

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    {% include "layout/footer.html" %}

  </main>

  <!-- JS (letakkan DI BAWAH) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static 'assets/js/plugins/perfect-scrollbar.min.js' %}"></script>
  <script src="{% static 'assets/js/sidenav-burger.js' %}"></script>
  <script src="{% static 'assets/js/soft-ui-dashboard-tailwind.js' %}"></script>

  <!-- JS tambahan per halaman -->
  {% block extra_js %}{% endblock %}
  
  <!-- Auto-hide messages after 3 seconds -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const notifications = document.querySelectorAll('#notification');
      notifications.forEach(function(notification, index) {
        setTimeout(function() {
          notification.style.opacity = '0';
          notification.style.transition = 'opacity 0.5s ease-out';
          setTimeout(function() {
            notification.remove();
          }, 500);
        }, 3000 + (index * 1000)); // 3 detik + 1 detik per notification
      });
    });
  </script>
</body>
</html>
