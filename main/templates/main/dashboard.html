{% load static %}
<!DOCTYPE html>
<html lang="en">

<!-- HEADER -->
{% include 'partials/header.html' %}

<body class="m-0 font-sans antialiased bg-gray-50 text-slate-500">

  <!-- SIDENAV -->
  {% include 'partials/sidenav.html' %}

  <main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">

    <!-- NAVBAR -->
    {% include 'partials/navbar.html' %}

    <!-- ====== ISI DASHBOARD ====== -->
    <div class="w-full px-6 py-6 mx-auto">

      <h1 class="text-xl font-bold mb-4">Dashboard</h1>

      <div class="flex flex-wrap -mx-3">
        <div class="w-full sm:w-1/2 xl:w-1/4 px-3 mb-6">
          <div class="bg-white rounded-2xl shadow-soft-xl p-4">
            <p class="text-sm font-semibold">Today's Users</p>
            <h5 class="font-bold">2,300</h5>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-soft-xl p-4 mt-6">
        <canvas id="chart-line" height="300"></canvas>
      </div>

    </div>
    <!-- ====== END DASHBOARD ====== -->

    <!-- FOOTER -->
    {% include 'partials/footer.html' %}

  </main>

  <!-- JS -->
  <script src="{% static 'assets/js/plugins/chartjs.min.js' %}"></script>
  <script src="{% static 'assets/js/plugins/perfect-scrollbar.min.js' %}"></script>
  <script src="{% static 'assets/js/soft-ui-dashboard-tailwind.js' %}"></script>

  <script>
    const ctx = document.getElementById("chart-line");
    new Chart(ctx, {
      type: "line",
      data: {
        labels: ["Jan", "Feb", "Mar", "Apr"],
        datasets: [{
          data: [120, 200, 150, 300],
          borderWidth: 3
        }]
      }
    });
  </script>

</body>
</html>
