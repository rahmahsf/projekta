{% extends "layout/base.html" %}
{% block title %}Edit Akun{% endblock %}

{% block content %}
<div class="w-full px-6 py-6">

  <!-- breadcrumb / back -->
  <p class="text-sm text-slate-400 mb-2">
    <a href="{% url 'akun' %}" class="hover:underline">&lt; Kembali</a>
  </p>

  <h3 class="text-xl font-bold text-slate-800 mb-6">
    Edit Akun
  </h3>

  <form method="POST" class="max-w-3xl">
    {% csrf_token %}

    <!-- Email -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-slate-600 mb-2">
        Email
      </label>
      <input
        type="email"
        name="email"
        value="{{ user_edit.email }}"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Nama Lengkap -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-slate-600 mb-2">
        Nama Lengkap
      </label>
      <input
        type="text"
        name="nama_lengkap"
        value="{{ user_edit.nama_lengkap }}"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Role -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-slate-600 mb-2">
        Role
      </label>
      <select
        name="role"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               bg-white text-slate-700
               focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="yangmed" {% if user_edit.role == "yangmed" %}selected{% endif %}>
          Yangmed
        </option>
        <option value="kepegawaian" {% if user_edit.role == "kepegawaian" %}selected{% endif %}>
          Kepegawaian
        </option>
      </select>
    </div>

    <!-- Divider -->
    <div class="border-t border-slate-200 my-8"></div>

    <!-- Info password -->
    <p class="text-sm text-slate-500 mb-4">
      Kosongkan jika tidak ingin mengganti password
    </p>

    <!-- Password Lama -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-slate-600 mb-2">
        Password Lama
      </label>
      <input
        type="password"
        name="password_lama"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Password Baru -->
    <div class="mb-8">
      <label class="block text-sm font-medium text-slate-600 mb-2">
        Password Baru
      </label>
      <input
        type="password"
        name="password_baru"
        class="w-full rounded-xl border border-slate-200 px-4 py-3
               focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Button -->
     <div class="form-actions">
  <button type="submit" class="btn-submit">
    Simpan
  </button>
</div>

  </form>
</div>
{% endblock %}
