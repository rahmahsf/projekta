{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'assets\img\logo-rs.png' %}" />
    <link rel="icon" type="image/png" href="{% static 'assets\img\logo-rs.png' %}" />

    <title>Login</title>

    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link href="{% static 'assets/css/nucleo-icons.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/css/nucleo-svg.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/css/soft-ui-dashboard-tailwind.css' %}" rel="stylesheet" />
  </head>

  <body class="m-0 font-sans antialiased font-normal bg-white text-slate-500">

    <main class="mt-0 transition-all duration-200 ease-soft-in-out">
      <section>
        <div class="relative flex items-center min-h-screen bg-cover bg-center">
          <div class="container z-10">
            <div class="flex flex-wrap -mx-3">
              <div class="flex flex-col w-full max-w-full px-3 mx-auto md:w-6/12 lg:w-5/12 xl:w-4/12">

                <div class="relative flex flex-col mt-32 bg-transparent border-0 shadow-none rounded-2xl">
                  <div class="p-6 pb-0 mb-0">
                    <h3 class="font-bold text-transparent bg-gradient-to-tl from-blue-600 to-cyan-400 bg-clip-text">
                      Welcome back
                    </h3>
                    <p class="mb-0">Enter your username and password</p>
                  </div>

                  <div class="flex-auto p-6">

                    <!-- FORM DJANGO -->
                    <form method="post" action="{% url 'login' %}">
                      {% csrf_token %}

                      <!-- USERNAME -->
                      <label class="mb-2 ml-1 font-bold text-xs text-slate-700">Username</label>
                      <div class="mb-4">
                        <input
                          type="text"
                          name="username"
                          required
                          class="focus:shadow-soft-primary-outline text-sm block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-700"
                          placeholder="Username"
                        />
                      </div>

                      <!-- PASSWORD -->
                      <label class="mb-2 ml-1 font-bold text-xs text-slate-700">Password</label>
                      <div class="mb-4">
                        <input
                          type="password"
                          name="password"
                          required
                          class="focus:shadow-soft-primary-outline text-sm block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-700"
                          placeholder="Password"
                        />
                      </div>

                      <!-- REMEMBER -->
                      <!-- <div class="flex items-center mb-4">
                        <input type="checkbox" class="mr-2" />
                        <label class="text-sm text-slate-700">Remember me</label>
                      </div> -->

                      <!-- SUBMIT -->
                      <div class="text-center">
                        <button
                          type="submit"
                          class="inline-block w-full px-6 py-3 mt-2 font-bold text-white uppercase rounded-lg bg-gradient-to-tl from-blue-600 to-cyan-400 hover:scale-102 transition">
                          Sign in
                        </button>
                      </div>
                    </form>

                    <!-- ERROR MESSAGE -->
                    {% if form.errors %}
                      <p class="mt-4 text-sm text-red-500 text-center">
                        Username atau password salah
                      </p>
                    {% endif %}

                  </div>

                  <!-- <div class="p-6 text-center">
                    <p class="text-sm">
                      Don't have an account?
                      <a href="#" class="font-semibold text-transparent bg-gradient-to-tl from-blue-600 to-cyan-400 bg-clip-text">
                        Sign up
                      </a>
                    </p>
                  </div>
                </div> -->

              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- JS -->
    <script src="{% static 'assets/js/plugins/perfect-scrollbar.min.js' %}"></script>
    <script src="{% static 'assets/js/soft-ui-dashboard-tailwind.js' %}"></script>

  </body>
</html>
